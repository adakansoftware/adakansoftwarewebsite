name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Smoke test routes
        run: |
          npm run start -- --hostname 127.0.0.1 --port 3101 &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT
          sleep 5
          npm run test:smoke
